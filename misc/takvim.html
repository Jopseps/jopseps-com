        <style>
            .calendar-container {
                background-color: #f8f6f3;
                padding: 40px;
                max-width: 900px;
                margin: 20px auto;
                border-radius: 8px;
                border: 1px solid #e0dcd5;
            }

            .calendar-title {
                text-align: center;
                font-family: 'Courier New', monospace;
                font-size: 48px;
                letter-spacing: 15px;
                margin-bottom: 30px;
                color: #333;
            }

            .calendar-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 25px;
            }

            .month-box {
                text-align: center;
            }

            .month-name {
                font-family: 'Georgia', serif;
                font-size: 18px;
                font-weight: bold;
                margin-bottom: 8px;
                color: #333;
            }

            .days-header {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                font-family: 'Courier New', monospace;
                font-size: 11px;
                color: #666;
                border-bottom: 1px solid #ccc;
                padding-bottom: 4px;
                margin-bottom: 4px;
            }

            .days-grid {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                font-family: 'Courier New', monospace;
                font-size: 13px;
                color: #555;
                row-gap: 2px;
            }

            .day-cell {
                padding: 2px 0;
                position: relative;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .day-cell.today {
                position: relative;
            }

            .day-cell.today::after {
                content: '';
                position: absolute;
                width: 20px;
                height: 20px;
                border: 2px solid #e53935;
                border-radius: 50%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            @media (max-width: 700px) {
                .calendar-grid {
                    grid-template-columns: repeat(2, 1fr);
                }
                .calendar-container {
                    padding: 20px;
                }
            }

            @media (max-width: 450px) {
                .calendar-grid {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
